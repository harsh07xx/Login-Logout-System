<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <button type="button" class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

        <!-- Login Form -->
        <div id="loginForm" class="login-form">
            <h1>Login</h1>
            <p>Access your account</p>

            <div id="alert" class="alert hidden"></div>

            <form id="loginFormEl" novalidate>
                <div class="form-group">
                    <label>Email</label>
                    <input
                        type="text"
                        id="email"
                        placeholder="admin@example.com"
                        autocomplete="username"
                        required
                    >
                    <div class="field-error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input-group">
                        <input
                            type="password"
                            id="password"
                            placeholder="admin123"
                            autocomplete="current-password"
                            required
                        >
                        <button
                            type="button"
                            class="toggle-password"
                            id="togglePasswordBtn"
                        >
                            🔒
                        </button>
                    </div>
                    <div class="strength-meter">
                        <div class="strength-meter-fill" id="strengthFill"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                    <div class="field-error" id="passwordError"></div>
                </div>

                <div class="remember-row">
                    <label>
                        <input type="checkbox" id="rememberMe">
                        Remember me
                    </label>
                    <span id="attemptsLabel" style="color:#999;"></span>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Login
                </button>
            </form>
        </div>

        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="welcome-screen hidden">
            <div class="avatar-large" id="avatarLarge"></div>
            <h1>🎉 Welcome!</h1>
            <div class="user-name" id="userName"></div>
            <div class="user-email" id="userEmail"></div>
            <div class="location-info" id="locationInfo"></div>
            <div class="session-timer" id="sessionTimer"></div>
            <div class="recent-logins hidden" id="recentLogins">
                <h3>Recent logins</h3>
                <ul id="recentLoginsList"></ul>
            </div>
            <button type="button" class="logout-btn" id="logoutBtn">
                Log Out
            </button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
